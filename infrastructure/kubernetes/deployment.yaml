apiVersion: v1
kind: Namespace
metadata:
  name: nexora

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: nexora-config
  namespace: nexora
data:
  NODE_ENV: "production"
  DATABASE_URL: "postgresql://nexora:$(DB_PASSWORD)@postgres-service:5432/nexora"
  REDIS_URL: "redis://redis-service:6379"
  MONGODB_URL: "mongodb://mongodb-service:27017/nexora"
  KAFKA_BROKERS: "kafka-service:9092"

---
apiVersion: v1
kind: Secret
metadata:
  name: nexora-secrets
  namespace: nexora
type: Opaque
stringData:
  DB_PASSWORD: "nexora-prod-secret"
  JWT_SECRET: "your-jwt-secret-here"
  REDIS_PASSWORD: "redis-secret"

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: nexora
spec:
  replicas: 3
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
      - name: api-gateway
        image: nexora/api-gateway:latest
        ports:
        - containerPort: 3000
        envFrom:
        - configMapRef:
            name: nexora-config
        - secretRef:
            name: nexora-secrets
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"

---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway-service
  namespace: nexora
spec:
  selector:
    app: api-gateway
  ports:
  - port: 3000
    targetPort: 3000
  type: LoadBalancer

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: nexora
spec:
  replicas: 3
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
    spec:
      containers:
      - name: auth-service
        image: nexora/auth-service:latest
        ports:
        - containerPort: 3001
        envFrom:
        - configMapRef:
            name: nexora-config
        - secretRef:
            name: nexora-secrets
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"

---
apiVersion: v1
kind: Service
metadata:
  name: auth-service
  namespace: nexora
spec:
  selector:
    app: auth-service
  ports:
  - port: 3001
    targetPort: 3001

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: feed-service
  namespace: nexora
spec:
  replicas: 5
  selector:
    matchLabels:
      app: feed-service
  template:
    metadata:
      labels:
        app: feed-service
    spec:
      containers:
      - name: feed-service
        image: nexora/feed-service:latest
        ports:
        - containerPort: 3002
        envFrom:
        - configMapRef:
            name: nexora-config
        resources:
          requests:
            memory: "512Mi"
            cpu: "500m"
          limits:
            memory: "1Gi"
            cpu: "1000m"

---
apiVersion: v1
kind: Service
metadata:
  name: feed-service
  namespace: nexora
spec:
  selector:
    app: feed-service
  ports:
  - port: 3002
    targetPort: 3002

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: feed-service-hpa
  namespace: nexora
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: feed-service
  minReplicas: 3
  maxReplicas: 20
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
