global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: 'nexora-production'
    environment: 'production'

# Alertmanager configuration
alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

# Load rules once and periodically evaluate them
rule_files:
  - 'alerts/*.yml'

# Scrape configurations
scrape_configs:
  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # API Gateway
  - job_name: 'api-gateway'
    kubernetes_sd_configs:
      - role: pod
        namespaces:
          names:
            - nexora
    relabel_configs:
      - source_labels: [__meta_kubernetes_pod_label_app]
        action: keep
        regex: api-gateway
      - source_labels: [__meta_kubernetes_pod_ip]
        target_label: __address__
        replacement: $1:3000

  # Auth Service
  - job_name: 'auth-service'
    kubernetes_sd_configs:
      - role: pod
        namespaces:
          names:
            - nexora
    relabel_configs:
      - source_labels: [__meta_kubernetes_pod_label_app]
        action: keep
        regex: auth-service
      - source_labels: [__meta_kubernetes_pod_ip]
        target_label: __address__
        replacement: $1:3001

  # Feed Service
  - job_name: 'feed-service'
    kubernetes_sd_configs:
      - role: pod
        namespaces:
          names:
            - nexora
    relabel_configs:
      - source_labels: [__meta_kubernetes_pod_label_app]
        action: keep
        regex: feed-service
      - source_labels: [__meta_kubernetes_pod_ip]
        target_label: __address__
        replacement: $1:3002

  # Messaging Service
  - job_name: 'messaging-service'
    kubernetes_sd_configs:
      - role: pod
        namespaces:
          names:
            - nexora
    relabel_configs:
      - source_labels: [__meta_kubernetes_pod_label_app]
        action: keep
        regex: messaging-service
      - source_labels: [__meta_kubernetes_pod_ip]
        target_label: __address__
        replacement: $1:3003

  # Livestream Service
  - job_name: 'livestream-service'
    kubernetes_sd_configs:
      - role: pod
        namespaces:
          names:
            - nexora
    relabel_configs:
      - source_labels: [__meta_kubernetes_pod_label_app]
        action: keep
        regex: livestream-service
      - source_labels: [__meta_kubernetes_pod_ip]
        target_label: __address__
        replacement: $1:3004

  # User Service
  - job_name: 'user-service'
    kubernetes_sd_configs:
      - role: pod
        namespaces:
          names:
            - nexora
    relabel_configs:
      - source_labels: [__meta_kubernetes_pod_label_app]
        action: keep
        regex: user-service
      - source_labels: [__meta_kubernetes_pod_ip]
        target_label: __address__
        replacement: $1:3005

  # Recommendation Service
  - job_name: 'recommendation-service'
    kubernetes_sd_configs:
      - role: pod
        namespaces:
