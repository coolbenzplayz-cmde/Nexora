version: '3.8'

services:
  # Nginx Reverse Proxy (Main Entry Point)
  nginx-proxy:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx-proxy.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - web-app
      - admin-panel
      - api-gateway

  # Web App
  web-app:
    build: ./apps/web
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - VITE_API_URL=/api
    depends_on:
      - api-gateway

  # Admin Panel
  admin-panel:
    build: ./admin
    ports:
      - "5174:5174"
    environment:
      - NODE_ENV=production
      - VITE_API_URL=/api
    depends_on:
      - api-gateway

  # API Gateway
  api-gateway:
    build: ./services/api_gateway
    ports:
      - "8080:8080"
    environment:
      - NODE_ENV=development
      - AUTH_SERVICE_URL=http://auth-service:3001
      - FEED_SERVICE_URL=http://feed-service:3002
      - MESSAGING_SERVICE_URL=http://messaging-service:3003
    depends_on:
      - auth-service
      - feed-service
      - messaging-service

  # Auth Service
  auth-service:
    build: ./services/auth_service
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=development
      - DATABASE_URL=postgresql://nexora:nexora@postgres:5432/nexora
      - REDIS_URL=redis://redis:6379
    depends_on:
      - postgres
      - redis

  # Feed Service
  feed-service:
    build: ./services/feed_service
    ports:
      - "3002:3002"
    environment:
      - NODE_ENV=development
      - MONGODB_URL=mongodb://mongodb:27017/nexora
      - REDIS_URL=redis://redis:6379
    depends_on:
      - mongodb
      - redis

  # Messaging Service
  messaging-service:
    build: ./services/messaging_service
    ports:
      - "3003:3003"
    environment:
      - NODE_ENV=development
      - MONGODB_URL=mongodb://mongodb:27017/nexora
      - REDIS_URL=redis://redis:6379
      - KAFKA_BROKERS=kafka:9092
    depends_on:
      - mongodb
      - redis
      - kafka

  # Livestream Service
  livestream-service:
    build: ./services/livestream_service
    ports:
      - "3004:3004"
    environment:
      - NODE_ENV=development
      - MONGODB_URL=mongodb://mongodb:27017/nexora
      - REDIS_URL=redis://redis:6379
    depends_on:
      - mongodb
      - redis

  # PostgreSQL
  postgres:
    image: postgres:15-alpine
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=nexora
      - POSTGRES_PASSWORD=nexora
      - POSTGRES_DB=nexora
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # MongoDB
  mongodb:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db

  # Redis
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  # Kafka
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    volumes:
      - zookeeper_data:/var/lib/zookeeper/data

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    depends_on:
      - zookeeper
    volumes:
      - kafka_data:/var/lib/kafka/data

  # Elasticsearch
  elasticsearch:
    image: elasticsearch:8.11.0
    ports:
      - "9200:9200"
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data

volumes:
  postgres_data:
  mongodb_data:
  redis_data:
  zookeeper_data:
  kafka_data:
  elasticsearch_data:
